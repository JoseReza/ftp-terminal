# FTP-Terminal: una sola variable define si es local o FTP.
# Se carga al ejecutar run_agent.py o el cliente si no existe .env.

[ftp_terminal]
# root = dirección o URL:
#   - Ruta local (sin ://)  → modo local. Ej: D:/Programas/ftp-terminal/devices
#   - URL FTP (con ://)     → modo online. Ej: ftp://usuario:contraseña@ftp.miempresa.com:21/devices
#   (Si no pones user:pass en la URL, usa las claves user y password de abajo)
root = D:/Programas/ftp-terminal/devices

# Solo si usas URL ftp://host/path sin credenciales en la URL:
# user = usuario
# password = tu_contraseña

# Nombre de este dispositivo (agente). Cliente puede pasar otro por argumento.
device = BCM025

# Poll del agente en segundos (opcional)
poll = 0.1

# Límite de transferencia agente→cliente en bytes (archivos y carpetas comprimidas). Por defecto 50 MB.
# Ej: 52428800 = 50 MB, 104857600 = 100 MB
max_transfer_size = 52428800
